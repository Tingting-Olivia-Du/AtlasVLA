# Aggressive config: prioritize fast non-zero online success.
# Usage:
#   ./vggt_vla/scripts/train.sh train_aggressive
#
# Dataset
dataset_repo: "lerobot/libero_spatial_image"
use_multi_view: true
task_names: null
task_indices: null
max_episodes: null
max_samples: null
cache_dir: "./data/hf_cache"

# Training
# batch_size: 128
batch_size: 64
num_epochs: 9999
max_steps: 80000
lr: 1.5e-4
weight_decay: 1.0e-5
num_workers: 4
grad_clip: 1.0

# Model
use_vision_tower: true
vision_tower_name: "dinosiglip-vit-so-224px"
freeze_vision_tower: true
use_pretrained_vggt: true
freeze_vggt: false
freeze_language: true
language_model: "Qwen/Qwen3-0.6B-Base"

action_horizon: 10
action_dim: 7

# Logging
log_dir: "./logs"
exp_name: "vla_libero_spatial_aggressive_dinosiglip"
save_freq: 999
save_every_steps: 10000
best_model_save_every_steps: 10000

use_wandb: true
wandb_entity: "tingtingdu06-uw-madison"
wandb_project: "vla-libero-spatial-train-260301"
wandb_run_name: null

# Online eval hook (every 5k steps, small sim eval)
online_eval_every_steps: 5000
online_eval_benchmark: "libero_spatial"
online_eval_task_ids: [0, 1, 2]
online_eval_num_episodes: 2
online_eval_max_steps: 220
online_eval_num_envs: 1
online_eval_action_chunk_size: 8
online_eval_max_init_states: 2
online_eval_save_videos: true

# System
device: "cuda"
gpus: "7"
seed: 42
