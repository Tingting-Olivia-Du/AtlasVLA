# VGGT LoRA finetuning config (Phase A style)
# Usage:
#   ./vggt_vla/scripts/train.sh train_vggt_lora "0,1,2,3"

# Dataset
dataset_repo: "lerobot/libero_spatial_image"
use_multi_view: true
task_names: null
task_indices: null
max_episodes: null
max_samples: null
cache_dir: "./data/hf_cache"

# Training
batch_size: 256
num_epochs: 9999
max_steps: 10000
lr: 2.0e-4
weight_decay: 1.0e-5
num_workers: 8
grad_clip: 1.0
warmup_steps: 300
min_lr_ratio: 0.03

# Model
use_vision_tower: true
vision_tower_name: "dinosiglip-vit-so-224px"
freeze_vision_tower: true
use_pretrained_vggt: true
freeze_vggt: false
use_vggt_lora: true
vggt_lora_rank: 8
vggt_lora_alpha: 16
vggt_lora_dropout: 0.05
vggt_lora_target_modules: ["qkv", "proj", "fc1", "fc2"]
freeze_language: true
language_model: "Qwen/Qwen3-0.6B-Base"

action_horizon: 10
action_dim: 7

# Logging
log_dir: "./logs"
exp_name: "vla_libero_spatial_vggt_lora"
save_freq: 999
save_every_steps: 1000
best_model_save_every_steps: 1000
use_wandb: true
wandb_entity: "tingtingdu06-uw-madison"
wandb_project: "260302-vla-libero-spatial-train"
wandb_run_name: null

# Online eval hook
online_eval_every_steps: 2000
online_eval_benchmark: "libero_spatial"
online_eval_task_ids: [0, 1, 2]
online_eval_num_episodes: 2
online_eval_max_steps: 220
online_eval_num_envs: 1
online_eval_action_chunk_size: 8
online_eval_max_init_states: 2
online_eval_save_videos: true

# System
device: "cuda"
gpus: "0,1,2,3"
seed: 42
allow_vggt_fallback: false
